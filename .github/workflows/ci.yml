name: CI

on:
  pull_request:
    branches: [main, stage]
  push:
    branches: [stage]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
      - name: Lint (placeholder)
        run: |
          echo "lint placeholder"
          exit 0

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: 'pnpm'
      - name: Dependencies installieren
        run: pnpm install
      - name: Type-check (alle Pakete)
        run: pnpm -r typecheck

  rls-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Postgres+pgTAP-Test-Image bauen
        run: |
          cat > Dockerfile.pgtap <<'EOF'
          FROM postgres:16
          RUN apt-get update \
            && apt-get install -y --no-install-recommends postgresql-16-pgtap \
            && rm -rf /var/lib/apt/lists/*
          EOF
          docker build -f Dockerfile.pgtap -t konsole-pgtap:ci .

      - name: Postgres-Container starten
        run: |
          docker run -d --name konsole-pg -e POSTGRES_PASSWORD=postgres -p 5432:5432 konsole-pgtap:ci
          until docker exec konsole-pg pg_isready -U postgres; do sleep 1; done

      - name: psql-Client installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-16

      - name: Auth-Stub, Migrations, Extension, Grants, Helfer, Fixtures anwenden
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          psql -v ON_ERROR_STOP=1 -f supabase/tests/helpers/000_auth_roles_and_uid.sql
          for f in supabase/migrations/*.sql; do psql -v ON_ERROR_STOP=1 -f "$f"; done
          psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgtap;"
          psql -v ON_ERROR_STOP=1 -f supabase/tests/helpers/001_grants.sql
          psql -v ON_ERROR_STOP=1 -f supabase/tests/helpers/002_test_helpers.sql
          psql -v ON_ERROR_STOP=1 -f supabase/tests/helpers/003_fixtures.sql

      - name: pgTAP-RLS-Suite ausführen (psql, ohne pg_prove)
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          set -uo pipefail
          status=0

          for f in supabase/tests/database/*.test.sql; do
            name=$(basename "$f")
            echo "::group::${name}"

            out="/tmp/${name}.tap"
            if ! psql -X -q -t -A -v ON_ERROR_STOP=1 -f "$f" > "$out" 2>&1; then
              echo "FEHLER: psql brach mit einem SQL-Fehler ab"
              cat "$out"
              status=1
              echo "::endgroup::"
              continue
            fi

            cat "$out"

            plan_line=$(grep -E '^[0-9]+\.\.[0-9]+$' "$out" | head -n1 || true)
            if [ -z "$plan_line" ]; then
              echo "FEHLER: kein TAP-Plan (\"1..N\") in der Ausgabe von ${name} gefunden"
              status=1
              echo "::endgroup::"
              continue
            fi
            plan_count=${plan_line#*..}

            ok_count=$(grep -cE '^(not )?ok [0-9]+' "$out" || true)
            not_ok_count=$(grep -cE '^not ok [0-9]+' "$out" || true)

            if [ "${not_ok_count:-0}" -gt 0 ]; then
              echo "FEHLER: ${not_ok_count} fehlgeschlagene Assertion(en) in ${name}"
              status=1
            fi

            if [ "${ok_count:-0}" -ne "$plan_count" ]; then
              echo "FEHLER: Plan sagt ${plan_count} Tests voraus, aber ${ok_count} Assertionen liefen in ${name}"
              status=1
            fi

            echo "::endgroup::"
          done

          exit $status

      - name: Postgres-Container stoppen
        if: always()
        run: docker rm -f konsole-pg

  test:
    needs: rls-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: 'pnpm'
      - name: Dependencies installieren
        run: pnpm install
      - name: Tests (alle Pakete, vitest run)
        run: pnpm -r test
